- name: Postgres setup
  hosts: all
  become: yes
  tasks:
    - name: Install PostgreSQL Repository
      ansible.builtin.dnf:
        name: https://download.postgresql.org/pub/repos/yum/reporpms/EL-9-x86_64/pgdg-redhat-repo-latest.noarch.rpm
        state: present
        disable_gpg_check: true

    - name: Disable postgres default module
      ansible.builtin.shell: dnf -qy module disable postgresql


    - name: Install postgresql
      ansible.builtin.dnf:
        state: present
        name:
          - "postgresql16-server"
          - "postgresql16"

    - name: Initialise database
      ansible.builtin.shell: /usr/pgsql-16/bin/postgresql-16-setup initdb

    - name: Start PostgreSQL service
      ansible.builtin.systemd_service:
        name: postgresql-16
        state: started
        enabled: yes

    - name: Upgrade postgres listen address
      ansible.builtin.replace:
        path: /var/lib/pgsql/16/data/postgresql.conf
        regexp: "#listen_addresses= 'localhost'"
        replace: "listen_addresses='*'"


